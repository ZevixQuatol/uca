spring:
  application:
    name: uca-base

server:
  port: ${UCA_BASE_PORT:20000}

management:
  endpoints:
    web:
      exposure:
        include: health,info

uca:
  registry:
    heartbeat-timeout: ${UCA_REGISTRY_HEARTBEAT_TIMEOUT:30s}
    offline-retention: ${UCA_REGISTRY_OFFLINE_RETENTION:2m}
    scan-interval: ${UCA_REGISTRY_SCAN_INTERVAL:5s}
